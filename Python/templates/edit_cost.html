{% extends "base.html" %}
{% block content %}

<h2>Edit Cost</h2>

<!-- SAVE FORM -->
<form method="post">
    <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" name="description" value="{{ cost.description }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Amount (€)</label>
        <input type="number" step="0.01" name="amount" value="{{ cost.amount }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Paid by</label>
        <input type="text" name="person" value="{{ cost.person }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Date & Time</label>
        <input type="datetime-local" name="date" class="form-control"
               value="{{ cost.date.strftime('%Y-%m-%dT%H:%M') }}">
    </div>

    <button type="submit" class="btn btn-primary">Save</button>
</form>

<hr>

<!-- DELETE FORM -->
<form method="post" action="{{ url_for('deleteCost', costId=cost.id) }}">
    <button type="submit" class="btn btn-danger" onclick="return confirm('Delete this cost?')">
        Delete Cost
    </button>
</form>

<br>
<a href="{{ url_for('vehicle', vehicleId=cost.vehicle.id) }}" class="btn btn-secondary">
    Back to Vehicle
</a>

{% endblock %}
