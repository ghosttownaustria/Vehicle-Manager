{% extends "base.html" %}
{% block content %}

<h2>Edit Vehicle</h2>

<form method="post">

    <div class="mb-3">
        <label class="form-label">Brand</label>
        <input type="text" name="brand" value="{{ vehicle.brand }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Model</label>
        <input type="text" name="model" value="{{ vehicle.model }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">VIN</label>
        <input type="text" name="vin" value="{{ vehicle.vin }}" class="form-control" required>
    </div>

    <hr>

    <h3>Vehicle Details</h3>

    <div class="mb-3">
        <label class="form-label">First Registration</label>
        <input type="text" name="firstRegistration" value="{{ vehicle.firstRegistration }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Engine Oil</label>
        <input type="text" name="engineOil" value="{{ vehicle.engineOil }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Gearbox Oil</label>
        <input type="text" name="gearboxOil" value="{{ vehicle.gearboxOil }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Diff Oil</label>
        <input type="text" name="diffOil" value="{{ vehicle.diffOil }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Coolant</label>
        <input type="text" name="coolant" value="{{ vehicle.coolant }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Fuel</label>
        <input type="text" name="fuel" value="{{ vehicle.fuel }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Engine Code</label>
        <input type="text" name="engineCode" value="{{ vehicle.engineCode }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">License Plate</label>
        <input type="text" name="licensePlate" value="{{ vehicle.licensePlate }}" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">
        Save Changes
    </button>

</form>

<hr>

<form method="post" action="{{ url_for('deleteVehicle', vehicleId=vehicle.id) }}">
    <button type="submit" class="btn btn-danger"
        onclick="return confirm('Delete this vehicle completely?')">
        Delete Vehicle
    </button>
</form>

<br>

<a href="{{ url_for('vehicle', vehicleId=vehicle.id) }}" class="btn btn-secondary">
    Back to Vehicle
</a>

{% endblock %}
