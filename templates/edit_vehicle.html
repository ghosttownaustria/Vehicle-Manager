{% extends "base.html" %}
{% block content %}

<h2>Edit Vehicle</h2>

<!-- SAVE FORM -->
<form method="post">
    <div class="mb-3">
        <label class="form-label">Brand</label>
        <input type="text" name="brand" value="{{ vehicle.brand }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Model</label>
        <input type="text" name="model" value="{{ vehicle.model }}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">VIN</label>
        <input type="text" name="vin" value="{{ vehicle.vin }}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
</form>

<hr>

<!-- DELETE FORM -->
<form method="post" action="{{ url_for('deleteVehicle', vehicleId=vehicle.id) }}">
    <button type="submit" class="btn btn-danger" onclick="return confirm('Delete this vehicle completely?')">
        Delete Vehicle
    </button>
</form>

<br>
<a href="{{ url_for('vehicle', vehicleId=vehicle.id) }}" class="btn btn-secondary">
    Back to Vehicle
</a>

{% endblock %}
